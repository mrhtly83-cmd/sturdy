name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno-tests:
    name: Deno (Edge Function unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno tests
        # --allow-read for std/assert imports; --no-check skips the slow
        # full type-check pass, the tests themselves still run typed.
        run: deno test --allow-read --no-check supabase/functions/_tests/

  mobile-tests:
    name: Mobile (Jest unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci
